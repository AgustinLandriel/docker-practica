name: Result - Build and Push Docker Image

on:
  push:
    branches:
      - main
    paths:
      - "result/**"  
  pull_request:
    branches:
      - main
    paths:
      - "result/**" 

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Docker Buildx

      
        uses: docker/setup-buildx-action@v2
      - name: Log in to DockerHub

        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_NAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: ./result                          # !!!!!!!!!!!!! carpeta con el Dockerfile !!!!!!!!!!!!!!!!!!!
          push: ${{ github.event_name == 'push' }} # solo pushea en push a main, no en PR
          tags: |
            ${{ secrets.DOCKERHUB_NAME }}/app-result:latest              
            ${{ secrets.DOCKERHUB_NAME }}/app-result:${{ github.sha }} 
        ## Arma la imagen con el tag "latest" y con el tag del commit SHA, y pushea a DockerHub si es un push a main, no en PR
      - name: Update GitOps Repository
        # Solo actualizamos el repo de GitOps si la construcción en DockerHub fue exitosa
        run: |
          # 1. Clonar el repositorio de GitOps usando el token personal (PAT)
          git clone https://x-access-token:${{ secrets.GITOPS_PAT }}@github.com/AgustinLandriel/gitops-voting-app.git
          cd gitops-voting-app
          
          # 2. Configurar usuario de Git para el commit automático
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          
          # 3. Reemplazar el tag de la imagen en el archivo YAML usando sed
          sed -i "s|image: ${{ secrets.DOCKERHUB_NAME }}/app-result:.*|image: ${{ secrets.DOCKERHUB_NAME }}/app-result:${{ github.sha }}|g" k8s/result/result.yaml
          
          # 4. Hacer commit y push del cambio
          git add .
          git commit -m "Update result image tag to ${{ github.sha }}"
          git push origin main


# 1. El CI buildea la imagen y la pushea a Docker Hub con tag = a1b2c3d (el SHA)
#       ↓
# 2. Este comando sed actualiza el YAML: image: .../app-result:a1b2c3d
#       ↓
# 3. El CI pushea ese YAML cambiado al repo de manifiestos
#       ↓
# 4. ArgoCD detecta que el YAML cambió (el tag es distinto)
#       ↓
# 5. ArgoCD despliega la imagen a1b2c3d → el Pod nuevo corre el código recién buildeado
